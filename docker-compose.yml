version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: netpolix-postgres
    environment:
      POSTGRES_USER: netpolix
      POSTGRES_PASSWORD: netpolix2024
      POSTGRES_DB: netpolix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: