<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personas - NetPolix Admin</title>
  <link rel="icon" href="/assets/logo-netpolix.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css"><link rel="stylesheet" href="/css/base.css"><link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css"><link rel="stylesheet" href="/css/animations.css"><link rel="stylesheet" href="/css/forms.css"><link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
      <header class="top-bar">
        <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
        <h2 class="top-bar-title">Personas</h2>
      </header>
      <div class="page-content">
        <div class="page-header"><h1>👥 Personas</h1><p>Actores, directores y productores del catálogo</p></div>
        <div class="toolbar">
          <div class="toolbar-left">
            <div class="search-bar" style="min-width:260px;"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="Buscar personas..." oninput="loadPeople()"></div>
            <select class="form-select" id="filter-role" style="width:150px;" onchange="loadPeople()">
              <option value="">Todos los roles</option><option value="actor">Actor</option><option value="director">Director</option><option value="productor">Productor</option>
            </select>
          </div>
          <div class="toolbar-right"><button class="btn btn-primary" onclick="openForm()">+ Nueva Persona</button></div>
        </div>
        <div id="people-table" class="fade-in-up"></div>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/components/notifications.js"></script>
  <script src="/js/components/sidebar.js"></script><script src="/js/components/modal.js"></script><script src="/js/components/table.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!AuthManager.checkAuth()) return;
      if (!AuthManager.redirectIfNotRole(['admin'])) return;
      renderSidebar('admin'); loadPeople();
    });
    async function loadPeople() {
      const q = document.getElementById('search-input').value;
      const role = document.getElementById('filter-role').value;
      let url = '/people';
      if (q) url += `?search=${encodeURIComponent(q)}`;
      if (role) url += (q ? '&' : '?') + `role=${role}`;
      try {
        const data = await NetPolixAPI.get(url);
        createTable('people-table', {
          columns: [
            { key: 'name', header: 'Nombre' },
            { key: 'birthDate', header: 'Nacimiento', type: 'date' },
            { key: 'nationality', header: 'Nacionalidad' },
            { key: 'roles', header: 'Roles', type: 'array' }
          ],
          data,
          emptyMessage: 'No hay personas registradas',
          actions: [
            { name: 'edit', icon: '✏️', class: 'btn-ghost btn-sm', onClick: r => openForm(r) },
            { name: 'del', icon: '🗑️', class: 'btn-ghost btn-sm', onClick: r => confirmModal('Eliminar', `¿Eliminar a "${r.name}"?`, async () => { await NetPolixAPI.delete('/people/'+r.id); showNotification('Eliminado','success'); loadPeople(); }) }
          ]
        });
      } catch (err) { showNotification('Error: '+err.message,'error'); }
    }
    function openForm(person=null) {
      showModal(person ? 'Editar Persona' : 'Nueva Persona', `
        <form id="pf">
          <div class="form-group"><label class="form-label">Nombre Completo *</label><input type="text" class="form-control" name="name" value="${person?.name||''}" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Fecha de Nacimiento</label><input type="date" class="form-control" name="birthDate" value="${person?.birthDate||''}"></div>
            <div class="form-group"><label class="form-label">Nacionalidad</label><input type="text" class="form-control" name="nationality" value="${person?.nationality||''}"></div>
          </div>
          <div class="form-group"><label class="form-label">Roles (separa con coma)</label><input type="text" class="form-control" name="roles" value="${(person?.roles||[]).join(', ')}" placeholder="actor, director, productor"></div>
        </form>`,
        `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="savePerson('${person?.id||''}')">Guardar</button>`
      );
    }
    async function savePerson(id) {
      const fd = new FormData(document.getElementById('pf'));
      const data = { name: fd.get('name'), birthDate: fd.get('birthDate'), nationality: fd.get('nationality'), roles: fd.get('roles').split(',').map(r=>r.trim()).filter(Boolean) };
      try {
        if (id) await NetPolixAPI.put('/people/'+id, data); else await NetPolixAPI.post('/people', data);
        showNotification('Guardado correctamente', 'success'); closeModal(); loadPeople();
      } catch (err) { showNotification(err.message,'error'); }
    }
  </script>
</body>
</html>
